# Facilitator: apply so ray-workshop appears as an OpenShift AI project in the dashboard.
# Participants create their own workbench in this project (Topic 0).
apiVersion: v1
kind: Namespace
metadata:
  name: ray-workshop
  labels:
    opendatahub.io/dashboard: "true"
    kueue.openshift.io/managed: "true"
  annotations:
    openshift.io/display-name: "Ray Workshop"
    openshift.io/description: "Hands-on Ray, CodeFlare, KubeRay, and Kueue workshop"
